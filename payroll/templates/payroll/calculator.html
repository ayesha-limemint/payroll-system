<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NJ Payroll Calculator</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-bottom: 0.75rem; }
    label span { display: block; font-weight: bold; margin-bottom: 0.25rem; }
    input, select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    small { color: #666; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; }
    #error { color: #c00; margin-top: 1rem; }
    #results { margin-top: 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; }
    tfoot td { font-weight: bold; }
  </style>
</head>
<body>
  <h1>NJ Gross-to-Net Calculator</h1>

  <form id="calc-form">
    <label>
      <span>Gross Pay</span>
      <input type="text" name="gross_pay" required placeholder="5000.00">
    </label>
    <label>
      <span>Filing Status</span>
      <select name="filing_status">
        <option value="single">Single</option>
        <option value="married_filing_jointly">Married Filing Jointly</option>
        <option value="married_filing_separately">Married Filing Separately</option>
        <option value="head_of_household">Head of Household</option>
      </select>
    </label>
    <label>
      <span>Pay Frequency</span>
      <select name="pay_frequency">
        <option value="weekly">Weekly</option>
        <option value="biweekly">Biweekly</option>
        <option value="semi_monthly">Semi-Monthly</option>
        <option value="monthly">Monthly</option>
      </select>
    </label>
    <label>
      <span>YTD Gross Before This Period</span>
      <input type="text" name="ytd_gross" required placeholder="0.00">
      <small>Enter 0.00 for the first paycheck of the year</small>
    </label>
    <label>
      <span>Pay Date <small>(optional — determines tax year)</small></span>
      <input type="date" name="pay_date">
    </label>
    <fieldset style="margin-top:1rem;padding:0.75rem;border:1px solid #ccc">
      <legend style="font-weight:bold">Pre-tax Deductions <small>(optional)</small></legend>
      <label>
        <span>401(k) Contribution ($)</span>
        <input type="text" id="deduction-401k" placeholder="0.00">
      </label>
      <label style="margin-top:0.5rem">
        <span>Health Insurance Premium ($)</span>
        <input type="text" id="deduction-health" placeholder="0.00">
      </label>
    </fieldset>
    <input type="hidden" name="state" value="NJ">
    <button type="submit">Calculate</button>
  </form>

  <div id="error" style="display:none"></div>

  <div id="results" style="display:none">
    <h2>Results &mdash; Tax Year: <span id="tax-year"></span></h2>
    <table>
      <thead>
        <tr><th>Tax</th><th>Amount</th></tr>
      </thead>
      <tbody id="tax-rows"></tbody>
      <tfoot>
        <tr><td>Total Taxes</td><td id="total-taxes"></td></tr>
      </tfoot>
    </table>
    <div id="deductions-section" style="display:none;margin-top:1rem">
      <table>
        <thead>
          <tr><th>Pre-tax Deduction</th><th>Amount</th></tr>
        </thead>
        <tbody id="deduction-rows"></tbody>
        <tfoot>
          <tr><td>Total Deductions</td><td id="total-deductions"></td></tr>
        </tfoot>
      </table>
    </div>
    <table style="margin-top:0.5rem">
      <tfoot>
        <tr><td><strong>Net Pay</strong></td><td id="net-pay"></td></tr>
      </tfoot>
    </table>
  </div>

  <script>
    document.getElementById('calc-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      document.getElementById('error').style.display = 'none';
      document.getElementById('results').style.display = 'none';

      const fd = new FormData(this);
      const body = {};
      fd.forEach(function (v, k) { if (v !== '') body[k] = v; });

      const deductions = [];
      const amt401k = document.getElementById('deduction-401k').value.trim();
      const amtHealth = document.getElementById('deduction-health').value.trim();
      if (amt401k) deductions.push({ code: '401k', name: '401(k) Contribution', amount: amt401k });
      if (amtHealth) deductions.push({ code: 'health_insurance', name: 'Health Insurance', amount: amtHealth });
      if (deductions.length) body.deductions = deductions;

      try {
        const resp = await fetch('/api/v1/calculate/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await resp.json();

        if (!resp.ok) {
          const msg = data.detail || JSON.stringify(data);
          document.getElementById('error').textContent = 'Error: ' + msg;
          document.getElementById('error').style.display = 'block';
          return;
        }

        document.getElementById('tax-year').textContent = data.tax_year;

        const tbody = document.getElementById('tax-rows');
        tbody.innerHTML = '';
        data.taxes.forEach(function (t) {
          const tr = document.createElement('tr');
          const td1 = document.createElement('td');
          const td2 = document.createElement('td');
          td1.textContent = t.name;
          td2.textContent = '$' + t.amount;
          tr.appendChild(td1);
          tr.appendChild(td2);
          tbody.appendChild(tr);
        });

        document.getElementById('total-taxes').textContent = '$' + data.total_taxes;

        const dedSection = document.getElementById('deductions-section');
        if (data.deductions && data.deductions.length > 0) {
          const dedTbody = document.getElementById('deduction-rows');
          dedTbody.innerHTML = '';
          let totalDed = 0;
          data.deductions.forEach(function (d) {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            const td2 = document.createElement('td');
            td1.textContent = d.name || d.code;
            td2.textContent = '$' + d.amount;
            tr.appendChild(td1);
            tr.appendChild(td2);
            dedTbody.appendChild(tr);
            totalDed += parseFloat(d.amount);
          });
          document.getElementById('total-deductions').textContent = '$' + totalDed.toFixed(2);
          dedSection.style.display = 'block';
        } else {
          dedSection.style.display = 'none';
        }

        document.getElementById('net-pay').textContent = '$' + data.net_pay;
        document.getElementById('results').style.display = 'block';
      } catch (err) {
        document.getElementById('error').textContent = 'Network error — check that the server is running.';
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
